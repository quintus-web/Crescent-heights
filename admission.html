<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="navbar">
        <a href="index.html" class="logo-section">
            <img src="images/logo.jpg" class="logo">
            <span class="school-name">Crescent Heights</span>
        </a>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="admission.html">Admissions</a>
            <a href="contact.html">Contact</a>
            <a href="gallery.html">Gallery</a>
        </nav>
    </div>
</header>

<section class="section">
    <h2>Admissions</h2>

    <p>Join our school and start your journey.</p>

    <ul>
        <li>Birth Certificate</li>
        <li>Previous School Report</li>
        <li>Passport Photos</li>
    </ul>

    <h3>Apply Now</h3>
<form name="application" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="application" />

  <input type="text" name="name" placeholder="Full Name" required />
  <input type="email" name="email" placeholder="Email Address" required />
  <input type="tel" name="phone" placeholder="Phone Number" required />
  
  <textarea name="message" placeholder="Application details"></textarea>

  <button type="submit">Apply Now</button>
  <input type="hidden" name="form-name" value="application" />
<input type="hidden" name="redirect" value="/success.html" />
</form>

</section>

<footer>
    <p>© 2026 Crescent Heights</p>
</footer>

</body>
</html>
